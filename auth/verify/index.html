<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify email — JarvQuant</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0a0d18" />
  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <style>
    :root{
      --bg: #0a0d18;
      --fg: rgba(245, 247, 255, 0.96);
      --fg-body: rgba(245, 247, 255, 0.82);
      --fg-dim: rgba(245, 247, 255, 0.66);
      --hair: rgba(245, 247, 255, 0.14);
      --c1: #6D28D9;
      --c2: #22D3EE;
      --amber: #F59E0B;
      --glow: rgba(79, 228, 240, 0.24);
      --glow-amber: rgba(245, 158, 11, 0.24);
      --radius: 14px;
    }
    *{ box-sizing: border-box; margin: 0; padding: 0; }
    html, body{ height: 100%; }
    body{
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(900px 520px at 50% 10%, rgba(34,211,238,0.13), transparent 62%),
        radial-gradient(1100px 900px at 18% 38%, rgba(109,40,217,0.10), transparent 70%),
        radial-gradient(100% 100% at 50% 50%, rgba(0,0,0,0.00), rgba(0,0,0,0.58));
    }
    .card{
      max-width: 480px; width: 100%;
      background: rgba(15, 20, 30, 0.85);
      border: 1px solid var(--hair);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
    }
    .icon{
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px; line-height: 1;
    }
    .icon.ok{
      background: rgba(34, 211, 238, 0.12);
      border: 2px solid var(--c2);
      color: var(--c2);
      box-shadow: 0 0 30px var(--glow);
    }
    .icon.err{
      background: rgba(245, 158, 11, 0.12);
      border: 2px solid var(--amber);
      color: var(--amber);
      box-shadow: 0 0 30px var(--glow-amber);
    }
    .icon.load{
      background: rgba(245, 247, 255, 0.06);
      border: 2px solid var(--hair);
      color: var(--fg-dim);
    }
    h1{
      font-size: 22px; font-weight: 700;
      color: var(--fg);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    p{
      color: var(--fg-body);
      font-size: 14px; line-height: 1.6;
      margin-bottom: 14px;
    }
    .steps{
      text-align: left;
      background: rgba(34, 211, 238, 0.06);
      border-left: 2px solid var(--c2);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 18px 0 20px;
    }
    .steps ol{
      margin: 0; padding-left: 20px;
      color: var(--fg-body);
      font-size: 13px; line-height: 1.7;
    }
    .meta{
      color: var(--fg-dim);
      font-size: 12px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--hair);
    }
    .brand{ color: var(--c2); font-weight: 600; letter-spacing: 0.02em; }
    .spinner{
      width: 26px; height: 26px;
      border: 3px solid var(--hair);
      border-top-color: var(--c2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" role="status" id="card">
    <div class="icon load" id="icon"><div class="spinner"></div></div>
    <h1 id="title">Verifying your email&hellip;</h1>
    <p id="message">Hang tight, this only takes a second.</p>
    <div id="extra"></div>
    <div class="meta">JarvQuant &mdash; The Trading OS for Retail Performance</div>
  </div>

  <script>
    (function(){
      const API = "https://jarvquant-api.onrender.com";
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const icon = document.getElementById("icon");
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const extra = document.getElementById("extra");

      function showOk(){
        icon.className = "icon ok";
        icon.innerHTML = "&#10003;";
        title.textContent = "Email verified";
        message.textContent = "Your account is now active.";
        extra.innerHTML = '<div class="steps"><ol>' +
          '<li>Close this browser tab</li>' +
          '<li>Return to the <span class="brand">JarvQuant</span> app</li>' +
          '<li>Log in with your email and password</li>' +
          '</ol></div>';
      }
      function showErr(msg){
        icon.className = "icon err";
        icon.innerHTML = "&#33;";
        title.textContent = "Verification failed";
        message.textContent = msg || "This link is invalid or has expired.";
        extra.innerHTML = '<p style="font-size:13px;color:var(--fg-dim);">' +
          'Open the app and use <strong>Resend verification link</strong> on the login screen to get a fresh email.' +
          '</p>';
      }

      if(!token){
        showErr("No verification token in the link.");
        return;
      }
      fetch(API + "/auth/verify?token=" + encodeURIComponent(token))
        .then(r => r.json().then(j => ({ok: r.ok, body: j})))
        .then(({ok, body}) => {
          if(ok) showOk();
          else showErr(body && body.detail ? body.detail : null);
        })
        .catch(() => showErr("Couldn't reach the server. Try again in a moment."));
    })();
  </script>
</body>
</html>
